<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | BORN FOR ADVENTURE</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }

        .auth-card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 480px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .auth-header p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        .helper-text {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 6px;
        }

        .error-message {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.875rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .google-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .google-hint {
            font-size: 0.75rem;
            color: #6b7280;
            text-align: center;
            margin-bottom: 16px;
        }

        #register-btn {
            width: 100%;
            margin-top: 8px;
        }

        .auth-footer {
            text-align: center;
            font-size: 0.875rem;
            margin-top: 20px;
        }

        .auth-footer a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .auth-card {
                padding: 24px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="light-page">

    <nav class="navbar">
        <div class="navbar-container">
            <button class="mobile-menu-btn">â˜°</button>
            <a href="index.html" class="logo">Born For <span class="text-accent">Adventure</span></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="shop.html" class="nav-link">Shop</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="nav-link">Login</a>
                <a href="account.html" class="nav-link">Account</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join BORN FOR ADVENTURE and start shopping</p>
            </div>

            <form id="register-form">
                <div class="error-message" id="auth-message"></div>

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <div class="helper-text">At least 8 characters with letters and numbers.</div>
                </div>

                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" placeholder="••••••••" required>
                </div>

                <button type="submit" id="register-btn" class="btn btn-primary">Create Account</button>
            </form>

            <div class="auth-divider" style="text-align:center; margin:20px 0; color:#9ca3af;">
                <span>OR</span>
            </div>
            <div class="google-wrap">
                <div id="google-signin"></div>
            </div>
            <div class="google-hint">Continue with your Google account.</div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/auth.js"></script>

</body>
</html>
